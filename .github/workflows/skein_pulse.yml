name: Sovereign Skein Heartbeat

# When does the AI wake up?
on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch:      # Allows us to click a "Run" button manually

jobs:
  analyze_market:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install google-genai requests
        
      - name: Fire the Synapse (Run Script)
        env:
          # This pulls your secret key out of the vault and hands it to the script
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ransom_engine.py
