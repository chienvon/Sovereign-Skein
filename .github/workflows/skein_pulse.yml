name: Sovereign Skein Pulse

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Issue URL for Bounty Executor (Leave blank for normal radar pulse)'
        required: false
        default: ''

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai

      - name: Run Mercenary Radar (Passive Only)
        if: github.event.inputs.target_url == ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python mercenary_radar.py

      - name: Run Bounty Hunter Radar (Passive Only)
        if: github.event.inputs.target_url == ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bounty_hunter.py

      - name: Update Command Center HUD (Passive Only)
        if: github.event.inputs.target_url == ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RABBY_ADDRESS: ${{ secrets.RABBY_ADDRESS }}
        run: python dashboard_gen.py

      - name: Run Bounty Executor (Manual Strike Only)
        if: github.event.inputs.target_url != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SKEIN_GITHUB_TOKEN: ${{ secrets.SKEIN_GITHUB_TOKEN }}
          RABBY_ADDRESS: ${{ secrets.RABBY_ADDRESS }}
          TARGET_ISSUE_URL: ${{ github.event.inputs.target_url }}
        run: python bounty_executor.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Sovereign Skein Auto-Pulse"
          git add -A
          git commit -m "Pulse: Radar Data & HUD Update" || echo "No changes to commit"
          git push
