name: Sovereign Skein Heartbeat

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Give the Skein permission to write its memory back to the repo
permissions:
  contents: write

jobs:
  analyze_market:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install google-genai requests pandas
        
      - name: Fire the Synapse (Run Script)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ransom_engine.py
        
      - name: Save Memory to Skein (Commit CSV)
        run: |
          git config --global user.name "Sovereign-Skein-Bot"
          git config --global user.email "skein@bot.com"
          git add ransom_ledger.csv
          # Only commit if there are changes to save
          git diff --quiet && git diff --staged --quiet || git commit -m "Skein Memory Update: Run logged"
          git push
