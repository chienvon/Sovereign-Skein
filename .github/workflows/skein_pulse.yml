name: Sovereign Skein Pulse

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:      # Allows manual trigger

jobs:
  analyze_market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt

      - name: Fire the Synapse (Run Script)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ransom_engine.py # The test is over; the engine is live.

      - name: Update HUD
        run: python dashboard_gen.py

      - name: Save Pulse Memory and HUD
        run: |
          git config --global user.name "Sovereign-Skein-Bot"
          git config --global user.email "skein@bot.com"
          git add ransom_ledger.csv index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Memory & HUD Update"
          git push

      - name: Upload HUD to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Tells GitHub to grab the index.html we just made

      - name: Deploy Live HUD
        uses: actions/deploy-pages@v4
