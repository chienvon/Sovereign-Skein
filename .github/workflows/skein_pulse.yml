name: Sovereign Skein Pulse

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes!
  workflow_dispatch: # Allows you to click the button manually

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  analyze_market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - run: pip install -r requirements.txt

      - name: Fire the Synapse
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ransom_engine.py

      - name: Update HUD
        run: python dashboard_gen.py

      - name: Save Pulse Memory and HUD
        run: |
          git config --global user.name "Sovereign-Skein-Bot"
          git config --global user.email "skein@bot.com"
          git add ransom_ledger.csv index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Memory & HUD Update"
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload HUD Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy_pages:
    needs: analyze_market
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Live HUD
        id: deployment
        uses: actions/deploy-pages@v4
